<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Artists</title>
    <link rel="stylesheet" href="/static/style/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <nav class="menu">
      <a href="/">
        <h1>Groupie Tracker</h1>
      </a>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="filter-space"></div>

      <div class="group">
        {{ range . }}
        <a href="/artist/{{ .Id }}">
          <div class="card">
            <img src="{{ .Image }}" alt="" loading="lazy" class="imgArtist" />
            <div class="details">
              <h1 class="artistName">{{ .Name }}</h1>
              <p class="creationDate">
                Creation Date: {{ .CreationDate }}, Members: {{ len .Members }}
              </p>
            </div>
          </div>
        </a>
        {{ end }}
      </div>
      <div class="filter">
        <div class="filter-header">
          <h2>Filters</h2>
          <span id="open-filter-btn" class="open-icon">+</span>
          <span id="close-filter-btn" class="close-icon">x</span>
        </div>
        <form action="/filter" method="POST">
          <div class="creation-filter">
            <label for="creation-date">Creation Date</label>
            <input
              type="range"
              name="creation-date"
              id="creation-date"
              class="creation-date range"
              min="1950"
              max="2025"
              value="1950"
            />
            <div class="date-range">
              <span>1950</span>
              <span id="creation-date-value">1950</span>
            </div>
          </div>
          <div class="first-album-filter">
            <label for="first-album-date">First Album Date</label>
            <input
              type="range"
              name="first-album-date"
              id="first-album-date"
              class="first-album-date range"
              min="1950"
              max="2025"
              value="1950"
            />
            <div class="date-range">
              <span>1950</span>
              <span id="first-album-date-value">1950</span>
            </div>
          </div>
          <div class="members-filter">
            <label for="">Number of Members</label>
            <div>
              <input
                type="checkbox"
                name="members"
                id="1-3"
                value="1-3"
                class="1-3 checkbox"
              />
              <label for="members">1-3 members</label>
            </div>
            <div>
              <input
                type="checkbox"
                name="members"
                id="4-6"
                value="4-6"
                class="4-6 checkbox"
              />
              <label for="members">4-6 members</label>
            </div>
            <div>
              <input
                type="checkbox"
                name="members"
                id="7"
                value="plus7"
                class="7 checkbox"
              />
              <label for="members">7+ members</label>
            </div>
          </div>
          <div class="location-filter">
            <label for="">Locations</label>
            <input
              type="search"
              name="locations"
              id="locations"
              placeholder="Search locations..."
              class="locations-search"
            />
          </div>
          <div class="btn-filter">
            <input type="submit" value="Apply Filters" class="btn btn-submit" />
            <input type="reset" value="Clear All" class="btn bnt-reset" />
          </div>
        </form>
      </div>
    </div>

    <script src="/static/js/script.js"></script>
  </body>
</html>
